<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castile Mobile Bot</title>
    <meta name="description" content="Tonton iklan, dapatkan saldo!">
    <meta name="monetag" content="59449f42804a7be353cd0932a3d9398d">
    <meta name="theme-color" content="#0073e6">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <!-- Monetag Integration -->
    <script src='//whephiwums.com/sdk.js' data-zone='9164092' data-sdk='show_9164092' defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: url('assets/background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0);
            border-radius: 10px;
            text-align: center;
        }

        .logo {
            margin-bottom: 5px;
        }

        .logo img {
            max-width: 50px;
        }

        .user-info {
            margin-bottom: 20px;
        }

        .user-info img {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
        }

        .user-info h2 {
            margin: 10px 0 5px;
            font-size: 10px;
        }

        .user-info p {
            font-size: 14px;
            color: #555;
        }

        .balance-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px auto;
        }

        .balance-card {
            background: linear-gradient(to right, #0073e6, #005bb5);
            padding: 8px 30px;
            border-radius: 8px;
            color: #fff;
            text-align: center;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .buttons-container button {
            background: linear-gradient(to right, #0073e6, #005bb5);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 30px;
            font-size: 10px;
            cursor: pointer;
        }

        .buttons-container button:hover {
            background: linear-gradient(to right, #005bb5, #003e80);
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            background: rgba(0, 0, 0, 0);
            font-size: 12px;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <div class="user-info">
            <img id="userAvatar" src="assets/default-avatar.png" alt="Avatar">
            <h3 id="userName">Nama User</h3>
            <small>@<span id="userID">UserID</span></small>
        </div>
        <div class="balance-container">
            <div class="balance-card">
                <h3>Iklan Hari Ini</h3>
                <p><span id="ads-count">0</span> / 200</p>
            </div>
            <div class="balance-card">
                <h3>Balance</h3>
                <p>Rp<span id="balance">0.00</span></p>
            </div>
        </div>
        <div class="buttons-container">
            <button onclick="showRewardedAd()">Tonton Iklan +5</button>
            <button onclick="withdraw()">Withdraw</button>
            <button onclick="viewHistory()">Riwayat Withdraw</button>
            <button onclick="goBack()">Kembali ke Menu</button>
        </div>
    </div>
    <footer>
        <p>© 2025 Castile Mobile Bot</p>
    </footer>
    <script defer>
        Telegram.WebApp.ready();
        const userData = Telegram.WebApp.initDataUnsafe || { user: { id: 'Unknown', first_name: 'User', username: 'unknown' } };
        document.getElementById('userName').textContent = userData.user.first_name;
        document.getElementById('userID').textContent = userData.user.username;
    </script>
    <script src="scripts/main.js" defer></script>
    <script src="scripts/event.js" defer></script>
</body>
</html>
