<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castile Mobile Bot</title>
    <meta name="description" content="Tonton iklan, dapatkan saldo!">
    <meta name="monetag" content="943fbc134b1454d7b79f1de1770c2b28">

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>

    <!-- Monetag Integration -->
    <script src='//whephiwums.com/sdk.js' data-zone='9110246' data-sdk='show_9110246'></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: url('frontend/assets/background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0);
            border-radius: 10px;
            text-align: center;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            max-width: 150px;
        }

        .user-info {
            margin-bottom: 20px;
        }

        .user-info img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
            margin-bottom: 10px;
        }

        .user-info h2 {
            margin: 10px 0 5px;
            font-size: 20px;
        }

        .user-info p {
            font-size: 14px;
            color: #555;
        }

        .balance-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
        }

        .balance-card {
            background: linear-gradient(to right, #0073e6, #005bb5);
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            text-align: center;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .buttons-container button {
            background: linear-gradient(to right, #0073e6, #005bb5);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .buttons-container button:hover {
            background: linear-gradient(to right, #005bb5, #003e80);
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            background: rgba(0, 0, 0, 0);
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body onload="loadUserData()">
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <img src="frontend/assets/logo.png" alt="Logo">
        </div>

        <!-- User Info -->
        <div class="user-info">
            <img id="userAvatar" src="frontend/assets/default-avatar.png" alt="User Avatar">
            <h2 id="userName">Nama User</h2>
            <p>@<span id="userID">UserID</span></p>
        </div>

        <!-- Balance Cards -->
        <div class="balance-container">
            <div class="balance-card">
                <h3>Iklan Hari Ini</h3>
                <h2><span id="ads-count">0</span> / 100</h2>
            </div>
            <div class="balance-card">
                <h3>Balance</h3>
                <h2>Rp<span id="balance">0.00</span></h2>
            </div>
        </div>

        <!-- Warning -->
        <div>
            <p style="color: red; font-weight: bold;">Peringatan Wajib: 1 HP, 1 Akun, 1 IP</p>
        </div>

        <!-- Buttons -->
        <div class="buttons-container">
            <button onclick="showRewardedAd()">Tonton Iklan +5</button>
            <button onclick="withdraw()">Withdraw</button>
            <button onclick="viewHistory()">Riwayat Withdraw</button>
            <button onclick="goBack()">Kembali ke Menu</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2025 Castile Mobile Bot</p>
    </footer>

    <!-- Path untuk file JavaScript -->
    <script src="frontend/scripts/main.js"></script>
    <script src="frontend/scripts/event.js"></script>
    <script src="frontend/scripts/payload.js"></script>
    <script src="frontend/scripts/webapp.js"></script>
</body>
</html>
